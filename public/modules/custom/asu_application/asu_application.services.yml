services:
  logger.channel.asu_application:
    parent: logger.channel_base
    arguments: [ 'asu_application' ]

  asu_application.application_subscriber:
    class: Drupal\asu_application\EventSubscriber\ApplicationSubscriber
    arguments:
      - '@logger.channel.asu_application'
      - '@asu_api.backendapi'
      - '@queue'
      - '@entity_type.manager'
      - '@asu_api.error_code_service'
      - '@language_manager'
      - '@datetime.time'
    tags:
      - { name: event_subscriber }

  asu_application.offer_notification:
    class: Drupal\asu_application\Service\OfferNotificationService
    arguments:
      - '@plugin.manager.mail'
      - '@language_manager'
      - '@entity_type.manager'
      - '@entity.repository'
      - '@logger.channel.asu_application'

  asu_application.offer_reminder:
    class: Drupal\asu_application\Service\OfferReminderService
    arguments:
      - '@asu_api.backendapi'
      - '@asu_application.offer_notification'
      - '@entity.repository'
      - '@state'
      - '@logger.channel.asu_application'
